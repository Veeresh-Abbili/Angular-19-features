<p>resource-rx-resource works!</p>

<table border="1" cellpadding="10" cellspacing="0">
    <thead>
        <tr>
            <th>S NO</th>
            <th>Name</th>
            <th>User Name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
         @for (item of resource.value(); track $index) {
             <tr>
               <td>{{item.id}}</td>
               <td>{{item.name}}</td>
               <td>{{item.username}}</td>
               <td>{{item.email}}</td>
             </tr>
            }
    </tbody>
</table>
